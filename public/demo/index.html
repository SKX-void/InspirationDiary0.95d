<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTF Editor</title>
    <link href="editor/http_cdn.quill_js.com_1.3.7_quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="demo/index.css">
    <link rel="stylesheet" href="demo/dynamicWindow.css">
</head>
<body>
<h1>RTF Editor</h1>
<div id="divForm"></div>
<!-- 文档 -->
<div class="form-group">
    <label for="document-select">选择文档：</label>
    <select id="document-select" onchange="selectTitleList()">
        <option value="">-- 未选择 --</option>
    </select>
    <button onclick="insertDocForm()">新建文档</button>
    <button onclick="updateDocForm()">修改文档</button>
    <button onclick="deleteDocForm()">删除文档</button>
</div>

<!-- 标题 -->
<div class="form-group">
    <label for="title-select">选择标题：</label>
    <select id="title-select" onchange="loadLastPage()">
        <option value="">-- 未选择 --</option>
    </select>
    <button onclick="insertTitleForm()">新建标题</button>
    <button onclick="updateTitleForm()">修改标题</button>
    <button onclick="deleteTitleForm()">删除标题</button>
</div>

<!-- 页码 -->
<div class="pagination-controls">
    <button onclick="goToPageOffset(-1)">上一页</button>
    <label for="page-input"></label><input type="number" id="page-input" min="1" placeholder="页码">
    <span id="total-pages">/ 总页数</span>
    <button onclick="goToPageOffset(1)">下一页</button>
    <button onclick="insertPageAtEndOf()">新增页面</button>
    <button onclick="deletePageAt()">删除页面</button>
    <button onclick="autoCutPage()">自动分页</button>
    <label for="auto-cut-input"></label><input id="auto-cut-input" type="number" min="1" value="5000">
</div>


<!-- Quill Editor -->
<div id="toolbar"></div>
<div id="editor-container"></div>

<!-- Actions -->
<button onclick="updatePage()">提交更改</button>

<script src="editor/http_cdn.quill_js.com_1.3.7_quill.js"></script>
<script src="demo/editor.js"></script>
<script src="demo/DTP/doc.js" defer></script>
<script src="demo/DTP/title.js"></script>
<script src="demo/DTP/page.js"></script>
<script src="demo/DTP/test.js"></script>
<script src="demo/dynamicJS/docForm.js"></script>
<script src="demo/dynamicJS/titleForm.js"></script>
<script>
    window.addEventListener('unload', function() {
        // 执行你的清理操作或保存状态的函数
        updatePage();
    });
    async function deleteForm(id){
        document.getElementById(id).innerHTML = '';
    }

    document.getElementById('page-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            goToPage();
        }
    });


</script>
</body>
</html>
