<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Quill 字体编辑 - 支持宋体等字体</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

  <style>
    body {
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    #editor {
      height: 300px;
    }

    .ql-font-simsun   { font-family: 'SimSun', '宋体', serif; }
    .ql-font-simhei   { font-family: 'SimHei', '黑体', sans-serif; }
    .ql-font-kaiti    { font-family: 'KaiTi', '楷体', serif; }
    .ql-font-fangsong { font-family: 'FangSong', '仿宋', serif; }
    .ql-font-yahei    { font-family: 'Microsoft YaHei', '微软雅黑', sans-serif; }

    /* 移除默认 ::before 内容 */
    .ql-font .ql-picker-item::before {
      content: none !important;
    }

    .ql-snow .ql-picker.ql-font .ql-picker-label::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item::before {
      content: '';
    }

    /* 自定义字体显示名称 */
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="sans-serif"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="sans-serif"]::before {
      content: '无衬线';
    }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="serif"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="serif"]::before {
      content: '衬线';
    }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="monospace"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="monospace"]::before {
      content: '等宽';
    }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="simsun"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="simsun"]::before {
      content: '宋体';
    }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="simhei"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="simhei"]::before {
      content: '黑体';
    }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="kaiti"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="kaiti"]::before {
      content: '楷体';
    }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="fangsong"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="fangsong"]::before {
      content: '仿宋';
    }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="yahei"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="yahei"]::before {
      content: '微软雅黑';
    }
  </style>
</head>
<body>

<h2>Quill 编辑器 - 支持宋体、黑体等字体</h2>
<div id="editor"></div>

<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>

<script>
  const Font = Quill.import('formats/font');
  Font.whitelist = [
    'sans-serif',
    'serif',
    'monospace',
    'simsun',
    'simhei',
    'kaiti',
    'fangsong',
    'yahei'
  ];
  Quill.register(Font, true);

  const customFonts = {
    'sans-serif': 'Sans Serif',
    'serif': 'Serif',
    'monospace': 'Monospace',
    'simsun': '宋体',
    'simhei': '黑体',
    'kaiti': '楷体',
    'fangsong': '仿宋',
    'yahei': '微软雅黑'
  };

  function updateFontDisplay(element) {
    const value = element.getAttribute('data-value');
    if (customFonts[value]) {
      element.innerHTML = '';
      const span = document.createElement('span');
      span.textContent = customFonts[value];
      element.appendChild(span);
    }
  }

  const quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
      toolbar: {
        container: [
          [{ 'font': Font.whitelist }],
          ['bold', 'italic', 'underline'],
          ['link', 'image']
        ]
      }
    }
  });

  // 确保 DOM 加载完成后操作
  document.querySelectorAll('.ql-font .ql-picker-item').forEach(updateFontDisplay);
  const defaultOption = document.querySelector('.ql-font .ql-picker-label .ql-selected');
  if (defaultOption) updateFontDisplay(defaultOption.closest('.ql-picker-item'));
</script>

</body>
</html>
