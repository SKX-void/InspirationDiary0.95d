<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTF Editor</title>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <link href="editor.css" rel="stylesheet">
    <style>
    </style>
</head>
<body>
<h1>RTF Editor</h1>
<button onclick="backPageIndex()" id="back-title-btn">返回页面列表</button>

<!-- 页码 -->
<div class="pagination-controls">
    <button onclick="goToPageOffset(-1)" id="prev-page-btn">上一页</button>
    <label for="page-input"></label><input type="text" pattern="\d*" id="page-input" min="1" placeholder="页码" style="width: 5em;">
    <span id="total-pages">/ 总页数</span>
    <button onclick="goToPageOffset(1)" id="next-page-btn">下一页</button>
    <button onclick="insertPageAtEndOf()">新增页面</button>
    <button onclick="deletePageAt()">删除页面</button>
    <button onclick="autoCutPage()">自动分页</button>
    <label for="auto-cut-input"></label><input id="auto-cut-input" min="1" value="5000" style="width: 4em;" type="text" pattern="\d*">
    <span id="textCount">当前页面字符数： </span>
    <span id="textChange" style="margin-left: 20px;">文本已修改(翻页保存检测)：否</span>
</div>


<!-- Quill Editor -->
<div id="toolbar"></div>
<div id="editor-container"></div>

<!-- Actions -->
<button onclick="updatePage()">提交更改</button>

<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
<script src="quillInit.js"></script>
<script src="pageImpl.js"></script>
<script>
let quillTextChange = false;
quill.on('text-change', function(delta, oldDelta, source) {
    quillTextChange = true;
    document.getElementById('textChange').textContent = '文本已修改(翻页保存检测)：是';
    const textCount = quill.getText().length;
    document.getElementById('textCount').textContent = '当前页面字符数：' + textCount;
});
    document.getElementById('page-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const docName = getQueryParameter('doc_name');
            const chapterId = getQueryParameter('chapter_id');
            const pageNum = getQueryParameter('page_num');
            goToPage(docName, chapterId, pageNum,quillTextChange);
        }
    });
    window.addEventListener('DOMContentLoaded', () => {
        const docName = getQueryParameter('doc_name');
        const chapterId = getQueryParameter('chapter_id');
        const pageNum = getQueryParameter('page_num');
        if (!docName || !chapterId || !pageNum) {
            document.getElementById('pageList').innerHTML = '<li>缺少 ID 位置，请检查 URL。</li>';
            return;
        }
        loadPage(docName, chapterId, pageNum); // 根据 docName, chapterId, lastPage 加载页面
    });
    function backPageIndex() {
        const docName = getQueryParameter('doc_name');
        const chapterId = getQueryParameter('chapter_id');
        const pageNum = getQueryParameter('page_num');
        window.location.href = `/pageIndex?doc_name=${docName}&chapter_id=${chapterId}&last_page=${pageNum}`;
    }
function updateWordCount() {

}

</script>
</body>
</html>
