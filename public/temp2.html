<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Background</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<script>
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');

    // 设置画布大小
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // 定义颜色集合
    const colorPalette1 = [
        '#6ab8ff',
        '#ee427c',
        '#ecec46',
        '#4a4ab9',
        '#efc478']
    ;
    const colorPalette = ['#f0f8ff', '#fff0f5', '#f5f5dc', '#e6e6fa', '#fffaf0'];
    // 创建一些颜色源点
    class ColorSource {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.color = colorPalette[Math.floor(Math.random() * colorPalette.length)]; // 随机选择颜色
            this.vx = (Math.random() - 0.5) * 2; // 随机速度X
            this.vy = (Math.random() - 0.5) * 2; // 随机速度Y
            this.radius = Math.random() * 50 + 30; // 随机半径
        }

        move() {
            this.x += this.vx;
            this.y += this.vy;

            // 边界检测
            if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
            if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
        }
    }

    // 初始化颜色源点
    const sources = [];
    for (let i = 0; i < 50; i++) { // 添加10个颜色源点
        sources.push(new ColorSource(
            Math.random() * canvas.width,
            Math.random() * canvas.height
        ));
    }

    // 绘制背景
    function drawBackground() {
        const imageData = ctx.createImageData(canvas.width, canvas.height);
        const data = imageData.data;

        for (let y = 0; y < canvas.height; y++) {
            for (let x = 0; x < canvas.width; x++) {
                let r = 255, g = 255, b = 255; // 默认背景为白色
                let totalInfluence = 0;

                sources.forEach(source => {
                    const dx = x - source.x;
                    const dy = y - source.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    // 使用指数衰减公式计算影响因子
                    const maxDistance = 150; // 最大影响距离
                    //const influence = Math.max(0, Math.exp(-distance / (maxDistance / 3)));
                    const influence = Math.max(0, Math.min(1, 1 - distance / maxDistance));
                    if (influence > 0) {
                        const [sr, sg, sb] = hexToRgb(source.color); // 将十六进制颜色转为RGB
                        // 根据影响因子调整颜色叠加
                        r += (sr - 255) * influence; // 白色背景 (255, 255, 255)
                        g += (sg - 255) * influence;
                        b += (sb - 255) * influence;
                        totalInfluence += influence;
                    }
                });

                // 归一化颜色值（可选）
                if (totalInfluence > 0) {
                    r = Math.min(255, Math.max(0, r)); // 确保颜色值在 [0, 255] 范围内
                    g = Math.min(255, Math.max(0, g));
                    b = Math.min(255, Math.max(0, b));
                }

                const index = (y * canvas.width + x) * 4;
                data[index] = r;     // R
                data[index + 1] = g; // G
                data[index + 2] = b; // B
                data[index + 3] = 255; // A
            }
        }

        ctx.putImageData(imageData, 0, 0);

        // 更新源点位置
        sources.forEach(source => source.move());

        requestAnimationFrame(drawBackground);
    }

    // 将十六进制颜色转换为RGB数组
    function hexToRgb(hex) {
        const bigint = parseInt(hex.slice(1), 16);
        const r = (bigint >> 16) & 255;
        const g = (bigint >> 8) & 255;
        const b = bigint & 255;
        return [r, g, b];
    }

    function drawSources() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); // 清除之前的圆圈
        sources.forEach(source => {
            ctx.beginPath();
            ctx.arc(source.x, source.y, 10, 0, Math.PI * 2); // 圆形半径为10
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; // 半透明黑色圆圈
            ctx.fill();
        });
    }
    drawBackground();
    // 每帧绘制源点圆圈（可选）
    setInterval(drawSources, 16); // 每16ms绘制一次，大约60fps
</script>
</body>
</html>
