<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Background</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<script>
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');

    // 设置画布大小
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // 定义颜色集合
    //const colorPalette = [        '#178ff5',        '#f32265',        '#f6f62d', '#3434f8', '#f8bc45'];
    //const colorPalette = ['#FFCCCC', '#FFE6CC', '#FFFFCC', '#CCFFCC', '#CCCCFF', '#D1C4E9', '#E6CCFF'];
    const colorPalette = ['#FFF0F0', '#FFF6E6', '#FFFFE0', '#E6FFE6', '#E6E6FF', '#F0ECFA', '#F5E6FF'];
    // 创建一些颜色源点
    class ColorSource {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.color = colorPalette[Math.floor(Math.random() * colorPalette.length)]; // 随机选择颜色
            this.vx = (Math.random() - 0.5) * 2; // 随机速度X
            this.vy = (Math.random() - 0.5) * 2; // 随机速度Y
        }

        move() {
            this.x += this.vx;
            this.y += this.vy;

            // 边界检测
            if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
            if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
        }
    }

    // 初始化颜色源点
    const sources = [];
    for (let i = 0; i < 20; i++) { // 添加10个颜色源点
        sources.push(new ColorSource(
            Math.random() * canvas.width,
            Math.random() * canvas.height
        ));
    }

    // 绘制背景
    const scaleFactor = 4; // 缩小比例
    const bufferCanvas = document.createElement('canvas');
    bufferCanvas.width = Math.ceil(canvas.width / scaleFactor);
    bufferCanvas.height = Math.ceil(canvas.height / scaleFactor);
    const bufferCtx = bufferCanvas.getContext('2d');

    function drawBackground() {
        const imageData = bufferCtx.createImageData(bufferCanvas.width, bufferCanvas.height);
        const data = imageData.data;

        for (let y = 0; y < bufferCanvas.height; y++) {
            for (let x = 0; x < bufferCanvas.width; x++) {
                let r = 0, g = 0, b = 0;
                let totalInfluence = 0;

                sources.forEach(source => {
                    const dx = x * scaleFactor - source.x;
                    const dy = y * scaleFactor - source.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 150;
                    const influence = Math.max(0, Math.exp(-distance / (maxDistance / 3)));

                    if (influence > 0) {
                        const [sr, sg, sb] = hexToRgb(source.color);
                        r += sr * influence;
                        g += sg * influence;
                        b += sb * influence;
                        totalInfluence += influence;
                    }
                });

                if (totalInfluence > 0) {
                    r /= totalInfluence;
                    g /= totalInfluence;
                    b /= totalInfluence;
                } else {
                    r = 255;
                    g = 255;
                    b = 255;
                }

                const index = (y * bufferCanvas.width + x) * 4;
                data[index] = r;
                data[index + 1] = g;
                data[index + 2] = b;
                data[index + 3] = 255;
            }
        }

        bufferCtx.putImageData(imageData, 0, 0);
        ctx.drawImage(bufferCanvas, 0, 0, canvas.width, canvas.height); // 放大绘制


        // 更新源点位置
        sources.forEach(source => source.move());

        requestAnimationFrame(drawBackground);
    }

    // 将十六进制颜色转换为RGB数组
    function hexToRgb(hex) {
        const bigint = parseInt(hex.slice(1), 16);
        const r = (bigint >> 16) & 255;
        const g = (bigint >> 8) & 255;
        const b = bigint & 255;
        return [r, g, b];
    }

    // 绘制圆形表示颜色源点的位置（调试用）
    // function drawSources() {
    //     ctx.clearRect(0, 0, canvas.width, canvas.height); // 清除之前的圆圈
    //     sources.forEach(source => {
    //         ctx.beginPath();
    //         ctx.arc(source.x, source.y, 10, 0, Math.PI * 2); // 圆形半径为10
    //         ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; // 半透明黑色圆圈
    //         ctx.fill();
    //     });
    // }

    drawBackground();
    // 每帧绘制源点圆圈（可选）
    setInterval(drawSources, 64); // 每16ms绘制一次，大约60fps
</script>
</body>
</html>
